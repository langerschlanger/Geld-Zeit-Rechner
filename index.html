<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Geld-Rechner</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .box {
      background: white;
      padding: 25px;
      border-radius: 14px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.12);
      width: 420px;
    }

    h1 {
      font-size: 24px;
      text-align: center;
      margin-top: 0;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .tab {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #e9e9e9;
      font-size: 16px;
      cursor: pointer;
    }

    .tab.active {
      background: #222;
      color: white;
    }

    label {
      display: block;
      margin-top: 15px;
      margin-bottom: 6px;
      font-weight: bold;
    }

    input, select {
      padding: 10px;
      font-size: 16px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 8px;
    }

    .row {
      display: flex;
      gap: 10px;
      width: 100%;
      align-items: center;
    }

    .preis-input {
      flex: 2;
      min-width: 0;
    }

    .preis-select {
      flex: 1.4;
      min-width: 0;
    }

    .wert-input {
      flex: 1.5;
      min-width: 0;
    }

    .wert-select {
      flex: 1.2;
      min-width: 0;
    }

    .klein-input {
      width: 90px;
      min-width: 0;
    }

    .text {
      white-space: nowrap;
      color: #333;
    }

    #betrag {
      width: 100%;
    }

    .hidden {
      display: none;
    }

    .hint {
      margin-top: 15px;
      font-size: 14px;
      color: #666;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="box">
    <h1>Geld-Rechner</h1>

    <div class="tabs">
      <button class="tab active" id="zeitTab">Zeit</button>
      <button class="tab" id="stueckTab">Stück</button>
    </div>

    <label id="preisLabel">Preis</label>

    <!-- Zeit-Preis-Zeile -->
    <div class="row" id="zeitPreisZeile">
      <input class="preis-input" type="text" id="preisZeit" value="30">

      <select class="preis-select" id="zeitPreisEinheit">
        <option value="1">pro Sekunde</option>
        <option value="60">pro Minute</option>
        <option value="3600" selected>pro Stunde</option>
        <option value="86400">pro Tag</option>
        <option value="604800">pro Woche</option>
        <option value="2592000">pro Monat</option>
        <option value="31536000">pro Jahr</option>
      </select>
    </div>

    <!-- Stück-Preis-Zeile -->
    <div class="row hidden" id="stueckPreisZeile">
      <input class="preis-input" type="text" id="preisStueck" value="10">
      <span class="text">€ pro</span>
      <input class="klein-input" type="text" id="stueckBasis" value="1">
      <span class="text">Stück</span>
    </div>

    <label id="wertLabel">Zeit</label>
    <div class="row">
      <input class="wert-input" type="text" id="wert" placeholder="Zeit eingeben">

      <select class="wert-select" id="wertEinheit">
        <option value="1">Sekunden</option>
        <option value="60">Minuten</option>
        <option value="3600" selected>Stunden</option>
        <option value="86400">Tage</option>
        <option value="604800">Wochen</option>
        <option value="2592000">Monate</option>
        <option value="31536000">Jahre</option>
      </select>
    </div>

    <label>Betrag</label>
    <input type="text" id="betrag" placeholder="Betrag in € eingeben">

    <div class="hint" id="hint">
      Du kannst entweder die Zeit oder den Betrag ändern.
    </div>
  </div>

  <script>
    const zeitTab = document.getElementById("zeitTab");
    const stueckTab = document.getElementById("stueckTab");

    const preisLabel = document.getElementById("preisLabel");
    const wertLabel = document.getElementById("wertLabel");
    const hint = document.getElementById("hint");

    const zeitPreisZeile = document.getElementById("zeitPreisZeile");
    const stueckPreisZeile = document.getElementById("stueckPreisZeile");

    const preisZeitInput = document.getElementById("preisZeit");
    const zeitPreisEinheitInput = document.getElementById("zeitPreisEinheit");

    const preisStueckInput = document.getElementById("preisStueck");
    const stueckBasisInput = document.getElementById("stueckBasis");

    const wertInput = document.getElementById("wert");
    const wertEinheitInput = document.getElementById("wertEinheit");
    const betragInput = document.getElementById("betrag");

    let modus = "zeit";
    let zuletztGeaendert = "wert";

    const zeitWertOptionen = `
      <option value="1">Sekunden</option>
      <option value="60">Minuten</option>
      <option value="3600" selected>Stunden</option>
      <option value="86400">Tage</option>
      <option value="604800">Wochen</option>
      <option value="2592000">Monate</option>
      <option value="31536000">Jahre</option>
    `;

    const stueckWertOptionen = `
      <option value="1" selected>Stück</option>
    `;

    function textZuZahl(text) {
      if (!text) return NaN;

      return parseFloat(
        text
          .toString()
          .replace(/\./g, "")
          .replace(",", ".")
      );
    }

    function zahlFormatieren(zahl, nachkommastellen = 2) {
      if (isNaN(zahl)) return "";

      return zahl.toLocaleString("de-DE", {
        minimumFractionDigits: nachkommastellen,
        maximumFractionDigits: nachkommastellen
      });
    }

    function getPreisProEinheit() {
      if (modus === "zeit") {
        const preis = textZuZahl(preisZeitInput.value) || 0;
        const basisSekunden = parseFloat(zeitPreisEinheitInput.value);
        return preis / basisSekunden;
      } else {
        const preis = textZuZahl(preisStueckInput.value) || 0;
        const basisStueck = textZuZahl(stueckBasisInput.value) || 1;
        return preis / basisStueck;
      }
    }

    function berechneVonWert() {
      const preisProEinheit = getPreisProEinheit();
      const wert = textZuZahl(wertInput.value);

      if (isNaN(wert)) {
        betragInput.value = "";
        return;
      }

      const gesamtEinheiten = wert * parseFloat(wertEinheitInput.value);
      const betrag = gesamtEinheiten * preisProEinheit;

      betragInput.value = zahlFormatieren(betrag, 2);
    }

    function berechneVonBetrag() {
      const preisProEinheit = getPreisProEinheit();
      const betrag = textZuZahl(betragInput.value);

      if (isNaN(betrag) || preisProEinheit === 0) {
        wertInput.value = "";
        return;
      }

      const gesamtEinheiten = betrag / preisProEinheit;
      const wert = gesamtEinheiten / parseFloat(wertEinheitInput.value);

      wertInput.value = zahlFormatieren(wert, 2);
    }

    function aktualisieren() {
      if (zuletztGeaendert === "wert") {
        berechneVonWert();
      } else {
        berechneVonBetrag();
      }
    }

    function wechsleModus(neuerModus) {
      modus = neuerModus;
      zuletztGeaendert = "wert";

      wertInput.value = "";
      betragInput.value = "";

      if (modus === "zeit") {
        zeitTab.classList.add("active");
        stueckTab.classList.remove("active");

        zeitPreisZeile.classList.remove("hidden");
        stueckPreisZeile.classList.add("hidden");

        preisLabel.textContent = "Preis";
        wertLabel.textContent = "Zeit";
        wertInput.placeholder = "Zeit eingeben";
        hint.textContent = "Du kannst entweder die Zeit oder den Betrag ändern.";

        wertEinheitInput.innerHTML = zeitWertOptionen;
      } else {
        stueckTab.classList.add("active");
        zeitTab.classList.remove("active");

        stueckPreisZeile.classList.remove("hidden");
        zeitPreisZeile.classList.add("hidden");

        preisLabel.textContent = "Preis pro Stückmenge";
        wertLabel.textContent = "Menge";
        wertInput.placeholder = "Menge eingeben";
        hint.textContent = "Du kannst entweder die Menge oder den Betrag ändern.";

        wertEinheitInput.innerHTML = stueckWertOptionen;
      }

      aktualisieren();
    }

    wertInput.addEventListener("input", () => {
      zuletztGeaendert = "wert";
      berechneVonWert();
    });

    betragInput.addEventListener("input", () => {
      zuletztGeaendert = "betrag";
      berechneVonBetrag();
    });

    preisZeitInput.addEventListener("input", aktualisieren);
    zeitPreisEinheitInput.addEventListener("change", aktualisieren);
    preisStueckInput.addEventListener("input", aktualisieren);
    stueckBasisInput.addEventListener("input", aktualisieren);
    wertEinheitInput.addEventListener("change", aktualisieren);

    zeitTab.addEventListener("click", () => {
      wechsleModus("zeit");
    });

    stueckTab.addEventListener("click", () => {
      wechsleModus("stueck");
    });

    function formatiereFeldBeimVerlassen(input, nachkommastellen = 2) {
      input.addEventListener("blur", () => {
        const wert = textZuZahl(input.value);
        if (!isNaN(wert)) input.value = zahlFormatieren(wert, nachkommastellen);
      });
    }

    formatiereFeldBeimVerlassen(preisZeitInput, 2);
    formatiereFeldBeimVerlassen(preisStueckInput, 2);
    formatiereFeldBeimVerlassen(stueckBasisInput, 0);
    formatiereFeldBeimVerlassen(wertInput, 2);
    formatiereFeldBeimVerlassen(betragInput, 2);
  </script>

</body>
</html>
